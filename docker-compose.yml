services:

  postgres:
    image: postgres:16-alpine
    container_name: pizzavotes-db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       pizzavotes
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pizzavotes"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: pizzavotes-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      VOTE_IMPL:   safedb
      DB_HOST:     postgres
      DB_PORT:     5432
      DB_NAME:     pizzavotes
      DB_USER:     postgres
      DB_PASSWORD: postgres
    ports:
      - "7070:7070"

volumes:
  postgres_data:

